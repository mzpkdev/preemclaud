name: Release Arasaka v1
on:
  push:
    branches: [main]
    paths:
      - 'arasaka/**'
      - '.github/workflows/release-arasaka.yml'
  workflow_dispatch:

jobs:
  build-and-release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout with submodules
        uses: actions/checkout@v4
        with:
          submodules: true
          fetch-depth: 0

      - name: Setup Bun
        uses: oven-sh/setup-bun@3d267786b128fe76c2f16a390aa2448b815359f3
        with:
          bun-version: 1.3.6

      - name: Install dependencies
        run: cd arasaka && bun install

      - name: Build
        run: cd arasaka && bun run build

      - name: Deploy to v1 branch
        env:
          RELEASE_TOKEN: ${{ secrets.ARASAKA_RELEASE_TOKEN || github.token }}
        run: |
          # The v1 branch contains the raw action under arasaka/ and the reusable
          # workflow entrypoint at .github/workflows/arasaka.yml.
          #
          # If the branch update includes workflow files, the default GITHUB_TOKEN
          # may be rejected. In that case, set ARASAKA_RELEASE_TOKEN to a token
          # with repository contents write access and workflow write access.
          mkdir -p /tmp/v1-release
          cp -r arasaka/dist/. /tmp/v1-release/
          cd /tmp/v1-release

          git init
          git checkout --orphan v1

          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          git add -A
          git commit -m "Release arasaka v1 from ${{ github.sha }}"

          git remote add origin "https://x-access-token:${RELEASE_TOKEN}@github.com/${{ github.repository }}.git"
          git push -f origin v1
