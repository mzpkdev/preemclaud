name: Arasaka Develop

on:
  workflow_call:
    inputs:
      model:
        type: string
        required: false
        default: ""
      trigger_phrase:
        type: string
        required: false
        default: "@arasaka"
      branch_prefix:
        type: string
        required: false
        default: "arasaka/"
      base_branch:
        type: string
        required: false
        default: ""
    secrets:
      ANTHROPIC_API_KEY:
        required: false
      CLAUDE_CODE_OAUTH_TOKEN:
        required: false
      GH_APP_TOKEN:
        required: false
      GH_APP_PRIVATE_KEY:
        required: false

jobs:
  discover:
    if: github.event_name == 'workflow_dispatch' || github.event_name == 'schedule'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      issues: read
    outputs:
      issue_number: ${{ steps.pick.outputs.issue_number }}
    steps:
      - name: Discover highest-priority bot-created issue without a work branch
        id: pick
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.GH_APP_TOKEN || github.token }}
        run: |
          ISSUES=$(gh issue list \
            --repo "$GITHUB_REPOSITORY" \
            --author "arasaka-net[bot]" \
            --state open \
            --json number,labels \
            --limit 50 \
            --jq '[ .[] | {
              number,
              labels: [.labels[].name]
            } ]')

          echo "::group::Discovered issues"
          echo "$ISSUES" | jq .
          echo "::endgroup::"

          if [ "$ISSUES" = "[]" ] || [ -z "$ISSUES" ]; then
            exit 0
          fi

          PICKED=$(echo "$ISSUES" | jq -r '
            { "P0": 0, "P1": 1, "P2": 2, "P3": 3 } as $rank
            | [ .[]
                | select(.labels | map(select(. == "good first issue")) | length == 0)
              ]
            | sort_by(
                (.labels | map(select(test("^P[0-3]$"))) | first // "P3") as $pl
                | ($rank[$pl] // 3), .number
              )
            | first.number // empty
          ')

          if [ -n "$PICKED" ]; then
            echo "issue_number=$PICKED" >> "$GITHUB_OUTPUT"
          fi

  develop:
    if: needs.discover.outputs.issue_number != ''
    needs: discover
    runs-on: ubuntu-latest
    permissions:
      contents: write
      id-token: write
      issues: write
      pull-requests: write
      actions: read
    steps:
      - name: Generate app token
        id: app-token
        continue-on-error: true
        uses: actions/create-github-app-token@v1
        with:
          app-id: "3218980"
          private-key: ${{ secrets.GH_APP_PRIVATE_KEY }}

      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Prepare branch
        id: branch
        shell: bash
        env:
          ISSUE_NUMBER: ${{ needs.discover.outputs.issue_number }}
          BASE_BRANCH_INPUT: ${{ inputs.base_branch }}
          DEFAULT_BRANCH: ${{ github.event.repository.default_branch }}
          BRANCH_PREFIX: ${{ inputs.branch_prefix }}
        run: |
          BASE_BRANCH="${BASE_BRANCH_INPUT:-$DEFAULT_BRANCH}"
          PREFIX="${BRANCH_PREFIX%/}"

          if [ -n "$PREFIX" ]; then
            BRANCH_NAME="$PREFIX/issue-$ISSUE_NUMBER"
          else
            BRANCH_NAME="issue-$ISSUE_NUMBER"
          fi

          git fetch origin "$BASE_BRANCH" --depth=1

          if git ls-remote --exit-code --heads origin "$BRANCH_NAME" >/dev/null 2>&1; then
            git fetch origin "$BRANCH_NAME" --depth=1
            git checkout -B "$BRANCH_NAME" "origin/$BRANCH_NAME"
          else
            git checkout -B "$BRANCH_NAME" "origin/$BASE_BRANCH"
          fi

          echo "base_branch=$BASE_BRANCH" >> "$GITHUB_OUTPUT"
          echo "branch_name=$BRANCH_NAME" >> "$GITHUB_OUTPUT"

      - name: Build develop preset
        id: preset
        uses: mzpkdev/preemclaud/arasaka/actions/develop@v1
        with:
          issue_number: ${{ needs.discover.outputs.issue_number }}
          branch_name: ${{ steps.branch.outputs.branch_name }}
          base_branch: ${{ steps.branch.outputs.base_branch }}
          run_url: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
          github_token: ${{ steps.app-token.outputs.token || secrets.GH_APP_TOKEN }}

      - name: Run issue implementation
        id: run
        uses: mzpkdev/preemclaud/arasaka@v1
        env:
          CLAUDE_BRANCH: ${{ steps.branch.outputs.branch_name }}
          BASE_BRANCH: ${{ steps.branch.outputs.base_branch }}
        with:
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          github_token: ${{ steps.app-token.outputs.token || secrets.GH_APP_TOKEN }}
          prompt: ${{ steps.preset.outputs.prompt }}
          system_prompt: ${{ steps.preset.outputs.system_prompt }}
          claude_args: ${{ steps.preset.outputs.claude_args }}
          model: ${{ inputs.model }}
          artifact_mode: "develop"
          artifact_issue_number: ${{ needs.discover.outputs.issue_number }}
          artifact_progress_comment_id: ${{ steps.preset.outputs.progress_comment_id }}
          base_branch: ${{ steps.branch.outputs.base_branch }}
          branch_prefix: ${{ inputs.branch_prefix }}
          additional_permissions: |
            workflows: write
          allowed_bots: "github-actions[bot],arasaka-net[bot]"

  develop_from_issue:
    if: >
      github.event_name == 'issue_comment' &&
      contains(github.event.comment.body, inputs.trigger_phrase)
    runs-on: ubuntu-latest
    permissions:
      contents: write
      id-token: write
      issues: write
      pull-requests: write
      actions: read
    steps:
      - name: Generate app token
        id: app-token
        continue-on-error: true
        uses: actions/create-github-app-token@v1
        with:
          app-id: "3218980"
          private-key: ${{ secrets.GH_APP_PRIVATE_KEY }}

      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Run direct issue development
        id: run
        uses: mzpkdev/preemclaud/arasaka@v1
        with:
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          github_token: ${{ steps.app-token.outputs.token || secrets.GH_APP_TOKEN }}
          model: ${{ inputs.model }}
          trigger_phrase: ${{ inputs.trigger_phrase }}
          base_branch: ${{ inputs.base_branch }}
          branch_prefix: ${{ inputs.branch_prefix }}
          additional_permissions: |
            workflows: write

  develop_from_review:
    if: >
      github.event_name == 'repository_dispatch' &&
      github.event.action == 'arasaka-revise'
    runs-on: ubuntu-latest
    permissions:
      contents: write
      id-token: write
      issues: write
      pull-requests: write
      actions: read
    steps:
      - name: Generate app token
        id: app-token
        continue-on-error: true
        uses: actions/create-github-app-token@v1
        with:
          app-id: "3218980"
          private-key: ${{ secrets.GH_APP_PRIVATE_KEY }}

      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.client_payload.branch_name }}
          fetch-depth: 0

      - name: Build develop preset
        id: preset
        uses: mzpkdev/preemclaud/arasaka/actions/develop@v1
        with:
          issue_number: ${{ github.event.client_payload.issue_number }}
          branch_name: ${{ github.event.client_payload.branch_name }}
          base_branch: ${{ github.event.client_payload.base_branch }}
          run_url: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
          github_token: ${{ steps.app-token.outputs.token || secrets.GH_APP_TOKEN }}

      - name: Run revision
        id: run
        uses: mzpkdev/preemclaud/arasaka@v1
        env:
          CLAUDE_BRANCH: ${{ github.event.client_payload.branch_name }}
          BASE_BRANCH: ${{ github.event.client_payload.base_branch }}
        with:
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          github_token: ${{ steps.app-token.outputs.token || secrets.GH_APP_TOKEN }}
          prompt: ${{ steps.preset.outputs.prompt }}
          system_prompt: ${{ steps.preset.outputs.system_prompt }}
          claude_args: ${{ steps.preset.outputs.claude_args }}
          model: ${{ inputs.model }}
          artifact_mode: "develop"
          artifact_issue_number: ${{ github.event.client_payload.issue_number }}
          base_branch: ${{ github.event.client_payload.base_branch }}
          branch_prefix: ${{ inputs.branch_prefix }}
          additional_permissions: |
            workflows: write
          allowed_bots: "github-actions[bot],arasaka-net[bot]"

  develop_from_ci_failure:
    if: >
      github.event_name == 'workflow_run' &&
      github.event.workflow_run.conclusion == 'failure'
    concurrency:
      group: arasaka-develop-ci-${{ github.event.workflow_run.head_branch }}
      cancel-in-progress: true
    runs-on: ubuntu-latest
    permissions:
      contents: write
      id-token: write
      issues: write
      pull-requests: write
      actions: read
    steps:
      - name: Extract PR context
        id: context
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.GH_APP_TOKEN || github.token }}
          BRANCH_PREFIX: ${{ inputs.branch_prefix }}
          HEAD_BRANCH: ${{ github.event.workflow_run.head_branch }}
        run: |
          PREFIX="${BRANCH_PREFIX%/}"
          if [ -n "$PREFIX" ] && [[ ! "$HEAD_BRANCH" == "$PREFIX/"* ]]; then
            echo "::notice::Branch '$HEAD_BRANCH' does not match prefix '$PREFIX/', skipping"
            echo "skip=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          PR_DATA=$(gh pr list \
            --repo "$GITHUB_REPOSITORY" \
            --head "$HEAD_BRANCH" \
            --state open \
            --json number,headRefName,baseRefName,body \
            --limit 1 | jq '.[0]')

          if [ "$PR_DATA" = "null" ] || [ -z "$PR_DATA" ]; then
            echo "::notice::No open PR found for branch '$HEAD_BRANCH', skipping"
            echo "skip=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          PR_NUMBER=$(echo "$PR_DATA" | jq -r '.number')
          BRANCH_NAME=$(echo "$PR_DATA" | jq -r '.headRefName')
          BASE_BRANCH=$(echo "$PR_DATA" | jq -r '.baseRefName')
          PR_BODY=$(echo "$PR_DATA" | jq -r '.body')

          ISSUE_NUMBER=$(echo "$PR_BODY" | grep -oiP 'Closes\s+#\K\d+' | head -1)

          if [ -z "$ISSUE_NUMBER" ]; then
            echo "::warning::No linked issue found in PR body, skipping"
            echo "skip=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          AHEAD_BY=$(gh api "repos/$GITHUB_REPOSITORY/compare/$BASE_BRANCH...$BRANCH_NAME" --jq '.ahead_by')
          if [ "$AHEAD_BY" -gt 3 ]; then
            echo "::warning::Branch is $AHEAD_BY commits ahead (max 3), likely in a fix loop — skipping"
            echo "skip=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          echo "pr_number=$PR_NUMBER" >> "$GITHUB_OUTPUT"
          echo "branch_name=$BRANCH_NAME" >> "$GITHUB_OUTPUT"
          echo "base_branch=$BASE_BRANCH" >> "$GITHUB_OUTPUT"
          echo "issue_number=$ISSUE_NUMBER" >> "$GITHUB_OUTPUT"
          echo "skip=false" >> "$GITHUB_OUTPUT"

      - name: Generate app token
        if: steps.context.outputs.skip != 'true'
        id: app-token
        continue-on-error: true
        uses: actions/create-github-app-token@v1
        with:
          app-id: "3218980"
          private-key: ${{ secrets.GH_APP_PRIVATE_KEY }}

      - name: Checkout repository
        if: steps.context.outputs.skip != 'true'
        uses: actions/checkout@v4
        with:
          ref: ${{ steps.context.outputs.branch_name }}
          fetch-depth: 0

      - name: Build develop preset
        if: steps.context.outputs.skip != 'true'
        id: preset
        uses: mzpkdev/preemclaud/arasaka/actions/develop@v1
        with:
          issue_number: ${{ steps.context.outputs.issue_number }}
          branch_name: ${{ steps.context.outputs.branch_name }}
          base_branch: ${{ steps.context.outputs.base_branch }}
          pr_number: ${{ steps.context.outputs.pr_number }}
          ci_failure: "true"
          github_token: ${{ steps.app-token.outputs.token || secrets.GH_APP_TOKEN }}

      - name: Run CI failure fix
        if: steps.context.outputs.skip != 'true'
        id: run
        uses: mzpkdev/preemclaud/arasaka@v1
        env:
          CLAUDE_BRANCH: ${{ steps.context.outputs.branch_name }}
          BASE_BRANCH: ${{ steps.context.outputs.base_branch }}
        with:
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          github_token: ${{ steps.app-token.outputs.token || secrets.GH_APP_TOKEN }}
          prompt: ${{ steps.preset.outputs.prompt }}
          system_prompt: ${{ steps.preset.outputs.system_prompt }}
          claude_args: ${{ steps.preset.outputs.claude_args }}
          model: ${{ inputs.model }}
          artifact_mode: "develop"
          artifact_issue_number: ${{ steps.context.outputs.issue_number }}
          base_branch: ${{ steps.context.outputs.base_branch }}
          branch_prefix: ${{ inputs.branch_prefix }}
          additional_permissions: |
            workflows: write
          allowed_bots: "github-actions[bot],arasaka-net[bot]"

  develop_from_pr_feedback:
    if: >
      github.event_name == 'pull_request_review' ||
      (
        github.event_name == 'issue_comment' &&
        github.event.issue.pull_request &&
        !contains(github.event.comment.body, inputs.trigger_phrase)
      )
    concurrency:
      group: arasaka-develop-pr-${{ github.event.pull_request.number || github.event.issue.number }}
      cancel-in-progress: true
    runs-on: ubuntu-latest
    permissions:
      contents: write
      id-token: write
      issues: write
      pull-requests: write
      actions: read
    steps:
      - name: Extract PR context
        id: context
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.GH_APP_TOKEN || github.token }}
          EVENT_NAME: ${{ github.event_name }}
        run: |
          if [ "$EVENT_NAME" = "pull_request_review" ]; then
            PR_NUMBER="${{ github.event.pull_request.number }}"
            BRANCH_NAME="${{ github.event.pull_request.head.ref }}"
            BASE_BRANCH="${{ github.event.pull_request.base.ref }}"
            PR_BODY=$(gh pr view "$PR_NUMBER" --repo "$GITHUB_REPOSITORY" --json body --jq '.body')
          else
            PR_NUMBER="${{ github.event.issue.number }}"
            PR_DATA=$(gh pr view "$PR_NUMBER" --repo "$GITHUB_REPOSITORY" --json headRefName,baseRefName,body)
            BRANCH_NAME=$(echo "$PR_DATA" | jq -r '.headRefName')
            BASE_BRANCH=$(echo "$PR_DATA" | jq -r '.baseRefName')
            PR_BODY=$(echo "$PR_DATA" | jq -r '.body')
          fi

          ISSUE_NUMBER=$(echo "$PR_BODY" | grep -oiP 'Closes\s+#\K\d+' | head -1)

          if [ -z "$ISSUE_NUMBER" ]; then
            echo "::warning::No linked issue found in PR body, skipping"
            echo "skip=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          echo "pr_number=$PR_NUMBER" >> "$GITHUB_OUTPUT"
          echo "branch_name=$BRANCH_NAME" >> "$GITHUB_OUTPUT"
          echo "base_branch=$BASE_BRANCH" >> "$GITHUB_OUTPUT"
          echo "issue_number=$ISSUE_NUMBER" >> "$GITHUB_OUTPUT"
          echo "skip=false" >> "$GITHUB_OUTPUT"

      - name: Generate app token
        if: steps.context.outputs.skip != 'true'
        id: app-token
        continue-on-error: true
        uses: actions/create-github-app-token@v1
        with:
          app-id: "3218980"
          private-key: ${{ secrets.GH_APP_PRIVATE_KEY }}

      - name: Checkout repository
        if: steps.context.outputs.skip != 'true'
        uses: actions/checkout@v4
        with:
          ref: ${{ steps.context.outputs.branch_name }}
          fetch-depth: 0

      - name: Build develop preset
        if: steps.context.outputs.skip != 'true'
        id: preset
        uses: mzpkdev/preemclaud/arasaka/actions/develop@v1
        with:
          issue_number: ${{ steps.context.outputs.issue_number }}
          branch_name: ${{ steps.context.outputs.branch_name }}
          base_branch: ${{ steps.context.outputs.base_branch }}
          pr_number: ${{ steps.context.outputs.pr_number }}
          github_token: ${{ steps.app-token.outputs.token || secrets.GH_APP_TOKEN }}

      - name: Run revision from PR feedback
        if: steps.context.outputs.skip != 'true'
        id: run
        uses: mzpkdev/preemclaud/arasaka@v1
        env:
          CLAUDE_BRANCH: ${{ steps.context.outputs.branch_name }}
          BASE_BRANCH: ${{ steps.context.outputs.base_branch }}
        with:
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          github_token: ${{ steps.app-token.outputs.token || secrets.GH_APP_TOKEN }}
          prompt: ${{ steps.preset.outputs.prompt }}
          system_prompt: ${{ steps.preset.outputs.system_prompt }}
          claude_args: ${{ steps.preset.outputs.claude_args }}
          model: ${{ inputs.model }}
          artifact_mode: "develop"
          artifact_issue_number: ${{ steps.context.outputs.issue_number }}
          artifact_progress_comment_id: ${{ steps.preset.outputs.progress_comment_id }}
          base_branch: ${{ steps.context.outputs.base_branch }}
          branch_prefix: ${{ inputs.branch_prefix }}
          additional_permissions: |
            workflows: write
          allowed_bots: "github-actions[bot],arasaka-net[bot]"
