<svg id="arasaka-footer" width="100%" viewBox="0 0 680 24" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="footer-bg" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#080404"/>
      <stop offset="50%" stop-color="#0c0607"/>
      <stop offset="100%" stop-color="#080404"/>
    </linearGradient>
    <filter id="footer-glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="1.7" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <rect width="680" height="24" fill="url(#footer-bg)"/>
  <line x1="0" y1="1" x2="680" y2="1" stroke="#3a1214" stroke-width="0.8"/>
