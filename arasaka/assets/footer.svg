  <line x1="0" y1="16" x2="680" y2="16" stroke="#120708" stroke-width="0.8" opacity="0.7"/>

  <g opacity="0.12">
    <line x1="92" y1="1" x2="92" y2="23" stroke="#c5162f"/>
    <line x1="588" y1="1" x2="588" y2="23" stroke="#c5162f"/>
  </g>

  <g filter="url(#footer-glow)">
    <rect x="10" y="5" width="2" height="14" fill="#c5162f"/>
    <rect x="668" y="5" width="2" height="14" fill="#c5162f"/>
    <circle cx="28" cy="12" r="2" fill="#c8a000" opacity="0.75"/>
    <circle cx="652" cy="12" r="2" fill="#c8a000" opacity="0.75"/>
  </g>

  <line x1="44" y1="12" x2="182" y2="12" stroke="#2f0e11" stroke-width="0.8"/>
