<svg id="arasaka-issue-reply" width="100%" viewBox="0 0 680 56" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="reply-bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#110708"/>
      <stop offset="60%" stop-color="#080405"/>
      <stop offset="100%" stop-color="#12090a"/>
    </linearGradient>
    <pattern id="reply-grid" width="20" height="20" patternUnits="userSpaceOnUse">
      <path d="M20 0 L0 0 0 20" fill="none" stroke="#c5162f" stroke-width="0.35" opacity="0.09"/>
    </pattern>
    <pattern id="reply-scan" width="680" height="4" patternUnits="userSpaceOnUse">
      <line x1="0" y1="0" x2="680" y2="0" stroke="#050304" stroke-width="1" opacity="0.3"/>
    </pattern>
    <filter id="reply-glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="2" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <rect width="680" height="56" fill="url(#reply-bg)"/>
  <rect width="680" height="56" fill="url(#reply-grid)"/>
  <rect width="680" height="56" fill="none" stroke="#2f1113" stroke-width="0.8"/>
  <rect x="44" y="0" width="636" height="56" fill="url(#reply-scan)" opacity="0.26"/>

  <g opacity="0.14">
    <line x1="92" y1="0" x2="92" y2="21" stroke="#c5162f"/>
    <line x1="152" y1="0" x2="152" y2="14" stroke="#c8a000"/>
    <line x1="520" y1="0" x2="520" y2="17" stroke="#c8a000"/>
    <line x1="592" y1="0" x2="592" y2="24" stroke="#c5162f"/>
  </g>

  <rect x="4" y="0" width="40" height="56" fill="#14090a"/>
  <rect x="44" y="0" width="1" height="56" fill="#331214"/>
  <rect x="4" y="0" width="676" height="1" fill="#3a1719"/>
  <rect x="4" y="55" width="676" height="1" fill="#3a1719"/>
  <rect width="4" height="56" fill="#c5162f" filter="url(#reply-glow)"/>
  <rect x="676" width="4" height="56" fill="#c5162f" filter="url(#reply-glow)"/>

  <g filter="url(#reply-glow)">
    <rect x="11" y="11" width="14" height="2" fill="#c5162f"/>
    <rect x="11" y="11" width="2" height="14" fill="#c5162f"/>
    <rect x="11" y="43" width="14" height="2" fill="#c5162f"/>
    <rect x="11" y="31" width="2" height="14" fill="#c5162f"/>
  </g>

  <text x="24" y="30" text-anchor="middle" dominant-baseline="middle" font-family="'Courier New', monospace" font-size="8.5" font-weight="700" fill="#e7b8b0" letter-spacing="1.2">REP</text>
  <text x="64" y="18" font-family="'Courier New', monospace" font-size="7.5" fill="#7a5052" letter-spacing="2">ISSUE RESPONSE</text>
  <text x="64" y="36" font-family="'Courier New', monospace" font-size="12" font-weight="700" fill="#d7c3b8" letter-spacing="1.1">ARASAKA AUTOMATED RESPONSE</text>
  <text x="278" y="18" font-family="'Courier New', monospace" font-size="7" fill="#7a252c" letter-spacing="1.4">応答  NODE-VERIFIED</text>
  <text x="632" y="18" text-anchor="end" font-family="'Courier New', monospace" font-size="7" fill="#af8e1f" letter-spacing="1.4">SYS://CLEARANCE-A2</text>

  <line x1="64" y1="24" x2="642" y2="24" stroke="#241012" stroke-width="0.8"/>
  <line x1="64" y1="42" x2="642" y2="42" stroke="#241012" stroke-width="0.8"/>
  <line x1="214" y1="42" x2="620" y2="42" stroke="#4b1419" stroke-width="0.5" opacity="0.45"/>

  <rect x="604" y="27" width="40" height="2" fill="#c5162f" opacity="0.22"/>
  <rect x="596" y="31" width="10" height="5" fill="#c5162f" opacity="0.08"/>
  <polygon points="626,16 634,24 626,32 618,24" fill="none" stroke="#8b1e27" stroke-width="0.7"/>
  <polygon points="644,16 652,24 644,32 636,24" fill="none" stroke="#4a1619" stroke-width="0.7"/>
</svg>
