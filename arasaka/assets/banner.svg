<svg id="arasaka-banner" width="100%" viewBox="0 0 680 110" xmlns="http://www.w3.org/2000/svg">
    <defs>
        <filter id="glow-red" x="-50%" y="-50%" width="200%" height="200%">
            <feGaussianBlur in="SourceGraphic" stdDeviation="2" result="blur"/>
            <feMerge>
                <feMergeNode in="blur"/>
                <feMergeNode in="SourceGraphic"/>
            </feMerge>
        </filter>
        <pattern id="scanlines" width="680" height="4" patternUnits="userSpaceOnUse">
            <line x1="0" y1="0" x2="680" y2="0" stroke="#1A0808" stroke-width="0.5"/>
        </pattern>
        <pattern id="grid" width="20" height="20" patternUnits="userSpaceOnUse">
            <line x1="0" y1="0" x2="20" y2="0" stroke="#C8102E" stroke-width="0.3" opacity="0.05"/>
            <line x1="0" y1="0" x2="0" y2="20" stroke="#C8102E" stroke-width="0.3" opacity="0.05"/>
        </pattern>
    </defs>
    <rect x="0" y="0" width="680" height="110" rx="4" fill="#0C0808"/>
    <rect x="0" y="0" width="680" height="110" rx="4" fill="none" stroke="#8B0816" stroke-width="1"/>
    <!-- background grid -->
    <rect x="30" y="8" width="620" height="94" fill="url(#grid)"/>
    <!-- corner marks -->
    <g filter="url(#glow-red)">
        <rect x="8" y="8" width="16" height="2" fill="#C8102E"/>
        <rect x="8" y="8" width="2" height="16" fill="#C8102E"/>
        <rect x="656" y="8" width="16" height="2" fill="#C8102E"/>
        <rect x="672" y="8" width="2" height="16" fill="#C8102E"/>
        <rect x="8" y="100" width="16" height="2" fill="#C8102E"/>
        <rect x="8" y="94" width="2" height="16" fill="#C8102E"/>
        <rect x="656" y="100" width="16" height="2" fill="#C8102E"/>
        <rect x="672" y="94" width="2" height="16" fill="#C8102E"/>
    </g>
    <!-- horizontal rule -->
    <line x1="36" y1="34" x2="644" y2="34" stroke="#3A1010" stroke-width="0.5"/>
    <line x1="36" y1="76" x2="644" y2="76" stroke="#3A1010" stroke-width="0.5"/>
    <!-- side accent bars -->
    <g filter="url(#glow-red)">
        <rect x="26" y="8" width="2" height="94" fill="#C8102E" opacity="0.6"/>
        <rect x="652" y="8" width="2" height="94" fill="#C8102E" opacity="0.6"/>
    </g>
    <!-- diamonds -->
    <g filter="url(#glow-red)">
        <polygon points="340,19 346,25 340,31 334,25" fill="#C8102E" opacity="0.9"/>
        <polygon points="340,79 346,85 340,91 334,85" fill="#C8102E" opacity="0.9"/>
    </g>
    <!-- main title -->
    <text x="340" y="57" text-anchor="middle" dominant-baseline="central" font-family="monospace" font-size="22"
          font-weight="700" fill="#E8D8D0" letter-spacing="8" filter="url(#glow-red)">ARASAKA
    </text>
    <!-- sub text left / right -->
    <text x="80" y="57" text-anchor="middle" dominant-baseline="central" font-family="monospace" font-size="9"
          fill="#8B3030" letter-spacing="3">CORPORATION
    </text>
    <text x="600" y="57" text-anchor="middle" dominant-baseline="central" font-family="monospace" font-size="9"
          fill="#8B3030" letter-spacing="3">東京 · 2077
    </text>
    <!-- scan line texture -->
    <rect x="36" y="34" width="608" height="42" fill="url(#scanlines)"/>
</svg>