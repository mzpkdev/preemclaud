<svg id="arasaka-error-reply" width="100%" viewBox="0 0 680 56" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="error-bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#140708"/>
      <stop offset="60%" stop-color="#090405"/>
      <stop offset="100%" stop-color="#18090a"/>
    </linearGradient>
    <pattern id="error-grid" width="20" height="20" patternUnits="userSpaceOnUse">
      <path d="M20 0 L0 0 0 20" fill="none" stroke="#ff4b54" stroke-width="0.35" opacity="0.09"/>
    </pattern>
    <pattern id="error-scan" width="680" height="4" patternUnits="userSpaceOnUse">
      <line x1="0" y1="0" x2="680" y2="0" stroke="#050304" stroke-width="1" opacity="0.3"/>
    </pattern>
    <filter id="error-glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="2" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <rect width="680" height="56" fill="url(#error-bg)"/>
  <rect width="680" height="56" fill="url(#error-grid)"/>
  <rect width="680" height="56" fill="none" stroke="#381416" stroke-width="0.8"/>
  <rect x="44" y="0" width="636" height="56" fill="url(#error-scan)" opacity="0.26"/>

  <g opacity="0.14">
    <line x1="94" y1="0" x2="94" y2="20" stroke="#ff4b54"/>
    <line x1="176" y1="0" x2="176" y2="16" stroke="#c8a000"/>
    <line x1="522" y1="0" x2="522" y2="18" stroke="#c8a000"/>
    <line x1="610" y1="0" x2="610" y2="24" stroke="#ff4b54"/>
  </g>

  <rect x="4" y="0" width="40" height="56" fill="#17090a"/>
  <rect x="44" y="0" width="1" height="56" fill="#381416"/>
  <rect x="4" y="0" width="676" height="1" fill="#4a1c1f"/>
  <rect x="4" y="55" width="676" height="1" fill="#4a1c1f"/>
  <rect width="4" height="56" fill="#ff4b54" filter="url(#error-glow)"/>
  <rect x="676" width="4" height="56" fill="#ff4b54" filter="url(#error-glow)"/>

  <polygon points="24,16.7 34,34 14,34" fill="none" stroke="#ff4b54" stroke-width="1.3" filter="url(#error-glow)"/>
  <text x="24" y="30.9" text-anchor="middle" font-family="'Courier New', monospace" font-size="9.5" font-weight="700" fill="#ff7b82">!</text>

  <text x="64" y="18" font-family="'Courier New', monospace" font-size="7.5" fill="#885355" letter-spacing="2">ERROR REPORT</text>
  <text x="64" y="36" font-family="'Courier New', monospace" font-size="12" font-weight="700" fill="#ff5e68" letter-spacing="1.2" filter="url(#error-glow)">OPERATION FAILED</text>
  <text x="234" y="18" font-family="'Courier New', monospace" font-size="7" fill="#84262d" letter-spacing="1.4">異常  CONTAINMENT REQUIRED</text>
  <text x="632" y="18" text-anchor="end" font-family="'Courier New', monospace" font-size="7" fill="#c09b28" letter-spacing="1.4">BLACK ICE EVENT</text>

  <line x1="64" y1="24" x2="642" y2="24" stroke="#281113" stroke-width="0.8"/>
  <line x1="64" y1="42" x2="642" y2="42" stroke="#281113" stroke-width="0.8"/>
  <line x1="248" y1="42" x2="620" y2="42" stroke="#68181f" stroke-width="0.5" opacity="0.5"/>

  <rect x="600" y="26" width="44" height="2" fill="#ff4b54" opacity="0.24"/>
  <rect x="592" y="30" width="10" height="5" fill="#ff4b54" opacity="0.08"/>
  <polygon points="626,16 634,24 626,32 618,24" fill="none" stroke="#ff4b54" stroke-width="0.7"/>
  <polygon points="644,16 652,24 644,32 636,24" fill="none" stroke="#4f171b" stroke-width="0.7"/>
</svg>
