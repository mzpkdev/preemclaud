name: Arasaka Develop

on:
  workflow_call:
    inputs:
      trigger_phrase:
        type: string
        required: false
        default: "@arasaka"
      ready_label:
        type: string
        required: false
        default: "arasaka:ready"
      branch_prefix:
        type: string
        required: false
        default: "claude/"
      base_branch:
        type: string
        required: false
        default: ""
      max_issues:
        type: string
        required: false
        default: "5"
    secrets:
      ANTHROPIC_API_KEY:
        required: false
      CLAUDE_CODE_OAUTH_TOKEN:
        required: false

jobs:
  discover:
    if: github.event_name == 'workflow_dispatch' || github.event_name == 'schedule'
    runs-on: ubuntu-latest
    permissions:
      issues: read
    outputs:
      issue_matrix: ${{ steps.matrix.outputs.issue_matrix }}
    steps:
      - name: Discover ready issues
        id: matrix
        shell: bash
        env:
          READY_LABEL: ${{ inputs.ready_label }}
          MAX_ISSUES: ${{ inputs.max_issues }}
          GH_TOKEN: ${{ github.token }}
        run: |
          ISSUES=$(gh issue list \
            --repo "$GITHUB_REPOSITORY" \
            --label "$READY_LABEL" \
            --state open \
            --json number,title \
            --limit "$MAX_ISSUES" \
            --jq '[.[] | {issue_number: (.number | tostring), issue_title: .title}]')

          if [ "$ISSUES" = "[]" ] || [ -z "$ISSUES" ]; then
            echo 'issue_matrix={"include":[]}' >> "$GITHUB_OUTPUT"
            exit 0
          fi

          MATRIX=$(echo "$ISSUES" | jq -c '{"include": .}')
          echo "issue_matrix=$MATRIX" >> "$GITHUB_OUTPUT"

  develop:
    if: >
      needs.discover.result == 'success' &&
      needs.discover.outputs.issue_matrix != '{"include":[]}'
    needs: discover
    runs-on: ubuntu-latest
    permissions:
      contents: write
      id-token: write
      issues: write
      pull-requests: write
      actions: read
    strategy:
      fail-fast: false
      matrix: ${{ fromJSON(needs.discover.outputs.issue_matrix) }}
    steps:
      - name: Remove ready label
        shell: bash
        env:
          ISSUE_NUMBER: ${{ matrix.issue_number }}
          READY_LABEL: ${{ inputs.ready_label }}
          GH_TOKEN: ${{ github.token }}
        run: |
          gh issue edit "$ISSUE_NUMBER" \
            --repo "$GITHUB_REPOSITORY" \
            --remove-label "$READY_LABEL"

      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Prepare branch
        id: branch
        shell: bash
        env:
          ISSUE_NUMBER: ${{ matrix.issue_number }}
          BASE_BRANCH_INPUT: ${{ inputs.base_branch }}
          DEFAULT_BRANCH: ${{ github.event.repository.default_branch }}
          BRANCH_PREFIX: ${{ inputs.branch_prefix }}
        run: |
          BASE_BRANCH="${BASE_BRANCH_INPUT:-$DEFAULT_BRANCH}"
          PREFIX="${BRANCH_PREFIX%/}"

          if [ -n "$PREFIX" ]; then
            BRANCH_NAME="$PREFIX/issue-$ISSUE_NUMBER"
          else
            BRANCH_NAME="issue-$ISSUE_NUMBER"
          fi

          git fetch origin "$BASE_BRANCH" --depth=1

          if git ls-remote --exit-code --heads origin "$BRANCH_NAME" >/dev/null 2>&1; then
            git fetch origin "$BRANCH_NAME" --depth=1
            git checkout -B "$BRANCH_NAME" "origin/$BRANCH_NAME"
          else
            git checkout -B "$BRANCH_NAME" "origin/$BASE_BRANCH"
          fi

          echo "base_branch=$BASE_BRANCH" >> "$GITHUB_OUTPUT"
          echo "branch_name=$BRANCH_NAME" >> "$GITHUB_OUTPUT"

      - name: Build develop preset
        id: preset
        uses: __ARASAKA_OWNER_REPO__/arasaka/actions/develop@__ARASAKA_REF__
        with:
          issue_number: ${{ matrix.issue_number }}
          branch_name: ${{ steps.branch.outputs.branch_name }}
          base_branch: ${{ steps.branch.outputs.base_branch }}

      - name: Run issue implementation
        id: run
        uses: __ARASAKA_OWNER_REPO__/arasaka@__ARASAKA_REF__
        env:
          CLAUDE_BRANCH: ${{ steps.branch.outputs.branch_name }}
          BASE_BRANCH: ${{ steps.branch.outputs.base_branch }}
        with:
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          prompt: ${{ steps.preset.outputs.prompt }}
          system_prompt: ${{ steps.preset.outputs.system_prompt }}
          claude_args: ${{ steps.preset.outputs.claude_args }}
          artifact_mode: "develop"
          artifact_issue_number: ${{ matrix.issue_number }}
          base_branch: ${{ steps.branch.outputs.base_branch }}
          branch_prefix: ${{ inputs.branch_prefix }}
          additional_permissions: |
            workflows: write
          allowed_bots: "github-actions[bot]"

  develop_from_issue:
    if: >
      github.event_name == 'issue_comment' &&
      contains(github.event.comment.body, inputs.trigger_phrase)
    runs-on: ubuntu-latest
    permissions:
      contents: write
      id-token: write
      issues: write
      pull-requests: write
      actions: read
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Run direct issue development
        id: run
        uses: __ARASAKA_OWNER_REPO__/arasaka@__ARASAKA_REF__
        with:
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          trigger_phrase: ${{ inputs.trigger_phrase }}
          base_branch: ${{ inputs.base_branch }}
          branch_prefix: ${{ inputs.branch_prefix }}
          additional_permissions: |
            workflows: write
