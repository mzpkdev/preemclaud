name: Arasaka Develop

on:
  workflow_call:
    inputs:
      model:
        type: string
        required: false
        default: ""
      trigger_phrase:
        type: string
        required: false
        default: "@arasaka"
      branch_prefix:
        type: string
        required: false
        default: "claude/"
      base_branch:
        type: string
        required: false
        default: ""
    secrets:
      ANTHROPIC_API_KEY:
        required: false
      CLAUDE_CODE_OAUTH_TOKEN:
        required: false
      GH_APP_TOKEN:
        required: false
      GH_APP_PRIVATE_KEY:
        required: false

jobs:
  discover:
    if: github.event_name == 'workflow_dispatch' || github.event_name == 'schedule'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      issues: read
    outputs:
      issue_number: ${{ steps.pick.outputs.issue_number }}
    steps:
      - name: Discover highest-priority bot-created issue without a work branch
        id: pick
        shell: bash
        env:
          BRANCH_PREFIX: ${{ inputs.branch_prefix }}
          GH_TOKEN: ${{ secrets.GH_APP_TOKEN || github.token }}
        run: |
          ISSUES=$(gh issue list \
            --repo "$GITHUB_REPOSITORY" \
            --author "app/arasaka-net" \
            --state open \
            --json number,labels \
            --limit 50 \
            --jq '[ .[] | {
              number,
              labels: [.labels[].name]
            } ]')

          if [ "$ISSUES" = "[]" ] || [ -z "$ISSUES" ]; then
            exit 0
          fi

          BRANCHES=$(git ls-remote --heads origin | awk '{print $2}' | sed 's|refs/heads/||')
          PREFIX="${BRANCH_PREFIX%/}"

          PICKED=$(echo "$ISSUES" | jq -r --arg branches "$BRANCHES" --arg prefix "$PREFIX" '
            ($branches | split("\n")) as $br
            | { "P0": 0, "P1": 1, "P2": 2, "P3": 3 } as $rank
            | [ .[]
                | select(.labels | map(select(. == "good first issue")) | length == 0)
                | (if $prefix != "" then "\($prefix)/issue-\(.number)" else "issue-\(.number)" end) as $expected
                | select([$br[] | select(. == $expected)] | length == 0)
              ]
            | sort_by(
                (.labels | map(select(test("^P[0-3]$"))) | first // "P3") as $pl
                | ($rank[$pl] // 3), .number
              )
            | first.number // empty
          ')

          if [ -n "$PICKED" ]; then
            echo "issue_number=$PICKED" >> "$GITHUB_OUTPUT"
          fi

  develop:
    if: needs.discover.outputs.issue_number != ''
    needs: discover
    runs-on: ubuntu-latest
    permissions:
      contents: write
      id-token: write
      issues: write
      pull-requests: write
      actions: read
    steps:
      - name: Generate app token
        if: secrets.GH_APP_PRIVATE_KEY != ''
        id: app-token
        uses: actions/create-github-app-token@v1
        with:
          app-id: "3218980"
          private-key: ${{ secrets.GH_APP_PRIVATE_KEY }}

      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Prepare branch
        id: branch
        shell: bash
        env:
          ISSUE_NUMBER: ${{ needs.discover.outputs.issue_number }}
          BASE_BRANCH_INPUT: ${{ inputs.base_branch }}
          DEFAULT_BRANCH: ${{ github.event.repository.default_branch }}
          BRANCH_PREFIX: ${{ inputs.branch_prefix }}
        run: |
          BASE_BRANCH="${BASE_BRANCH_INPUT:-$DEFAULT_BRANCH}"
          PREFIX="${BRANCH_PREFIX%/}"

          if [ -n "$PREFIX" ]; then
            BRANCH_NAME="$PREFIX/issue-$ISSUE_NUMBER"
          else
            BRANCH_NAME="issue-$ISSUE_NUMBER"
          fi

          git fetch origin "$BASE_BRANCH" --depth=1

          if git ls-remote --exit-code --heads origin "$BRANCH_NAME" >/dev/null 2>&1; then
            git fetch origin "$BRANCH_NAME" --depth=1
            git checkout -B "$BRANCH_NAME" "origin/$BRANCH_NAME"
          else
            git checkout -B "$BRANCH_NAME" "origin/$BASE_BRANCH"
          fi

          echo "base_branch=$BASE_BRANCH" >> "$GITHUB_OUTPUT"
          echo "branch_name=$BRANCH_NAME" >> "$GITHUB_OUTPUT"

      - name: Build develop preset
        id: preset
        uses: __ARASAKA_OWNER_REPO__/arasaka/actions/develop@__ARASAKA_REF__
        with:
          issue_number: ${{ needs.discover.outputs.issue_number }}
          branch_name: ${{ steps.branch.outputs.branch_name }}
          base_branch: ${{ steps.branch.outputs.base_branch }}
          run_url: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
          github_token: ${{ steps.app-token.outputs.token || secrets.GH_APP_TOKEN }}

      - name: Run issue implementation
        id: run
        uses: __ARASAKA_OWNER_REPO__/arasaka@__ARASAKA_REF__
        env:
          CLAUDE_BRANCH: ${{ steps.branch.outputs.branch_name }}
          BASE_BRANCH: ${{ steps.branch.outputs.base_branch }}
        with:
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          github_token: ${{ steps.app-token.outputs.token || secrets.GH_APP_TOKEN }}
          prompt: ${{ steps.preset.outputs.prompt }}
          system_prompt: ${{ steps.preset.outputs.system_prompt }}
          claude_args: ${{ steps.preset.outputs.claude_args }}
          model: ${{ inputs.model }}
          artifact_mode: "develop"
          artifact_issue_number: ${{ needs.discover.outputs.issue_number }}
          artifact_progress_comment_id: ${{ steps.preset.outputs.progress_comment_id }}
          base_branch: ${{ steps.branch.outputs.base_branch }}
          branch_prefix: ${{ inputs.branch_prefix }}
          additional_permissions: |
            workflows: write
          allowed_bots: "github-actions[bot],arasaka-net[bot]"

  develop_from_issue:
    if: >
      github.event_name == 'issue_comment' &&
      contains(github.event.comment.body, inputs.trigger_phrase)
    runs-on: ubuntu-latest
    permissions:
      contents: write
      id-token: write
      issues: write
      pull-requests: write
      actions: read
    steps:
      - name: Generate app token
        if: secrets.GH_APP_PRIVATE_KEY != ''
        id: app-token
        uses: actions/create-github-app-token@v1
        with:
          app-id: "3218980"
          private-key: ${{ secrets.GH_APP_PRIVATE_KEY }}

      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Run direct issue development
        id: run
        uses: __ARASAKA_OWNER_REPO__/arasaka@__ARASAKA_REF__
        with:
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          github_token: ${{ steps.app-token.outputs.token || secrets.GH_APP_TOKEN }}
          model: ${{ inputs.model }}
          trigger_phrase: ${{ inputs.trigger_phrase }}
          base_branch: ${{ inputs.base_branch }}
          branch_prefix: ${{ inputs.branch_prefix }}
          additional_permissions: |
            workflows: write

  develop_from_review:
    if: >
      github.event_name == 'repository_dispatch' &&
      github.event.action == 'arasaka-revise'
    runs-on: ubuntu-latest
    permissions:
      contents: write
      id-token: write
      issues: write
      pull-requests: write
      actions: read
    steps:
      - name: Generate app token
        if: secrets.GH_APP_PRIVATE_KEY != ''
        id: app-token
        uses: actions/create-github-app-token@v1
        with:
          app-id: "3218980"
          private-key: ${{ secrets.GH_APP_PRIVATE_KEY }}

      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.client_payload.branch_name }}
          fetch-depth: 0

      - name: Build develop preset
        id: preset
        uses: __ARASAKA_OWNER_REPO__/arasaka/actions/develop@__ARASAKA_REF__
        with:
          issue_number: ${{ github.event.client_payload.issue_number }}
          branch_name: ${{ github.event.client_payload.branch_name }}
          base_branch: ${{ github.event.client_payload.base_branch }}
          run_url: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
          github_token: ${{ steps.app-token.outputs.token || secrets.GH_APP_TOKEN }}

      - name: Run revision
        id: run
        uses: __ARASAKA_OWNER_REPO__/arasaka@__ARASAKA_REF__
        env:
          CLAUDE_BRANCH: ${{ github.event.client_payload.branch_name }}
          BASE_BRANCH: ${{ github.event.client_payload.base_branch }}
        with:
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          github_token: ${{ steps.app-token.outputs.token || secrets.GH_APP_TOKEN }}
          prompt: ${{ steps.preset.outputs.prompt }}
          system_prompt: ${{ steps.preset.outputs.system_prompt }}
          claude_args: ${{ steps.preset.outputs.claude_args }}
          model: ${{ inputs.model }}
          artifact_mode: "develop"
          artifact_issue_number: ${{ github.event.client_payload.issue_number }}
          base_branch: ${{ github.event.client_payload.base_branch }}
          branch_prefix: ${{ inputs.branch_prefix }}
          additional_permissions: |
            workflows: write
          allowed_bots: "github-actions[bot],arasaka-net[bot]"
