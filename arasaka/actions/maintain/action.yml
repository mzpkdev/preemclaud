name: "Arasaka Maintain Preset"
description: "Generate prompt, system prompt, and Claude args for repository maintenance"

inputs:
  stale_days:
    description: "Number of days of inactivity before an issue/PR is considered stale"
    required: false
    default: "30"
  stale_label:
    description: "Label to apply when warning about staleness"
    required: false
    default: "stale"
  max_actions:
    description: "Maximum number of maintenance actions per run"
    required: false
    default: "10"
  dry_run:
    description: "If true, report planned actions without executing them"
    required: false
    default: "false"

outputs:
  prompt:
    description: "Maintenance prompt"
    value: ${{ steps.preset.outputs.prompt }}
  system_prompt:
    description: "Maintenance system prompt"
    value: ${{ steps.preset.outputs.system_prompt }}
  claude_args:
    description: "Claude CLI arguments for maintenance"
    value: ${{ steps.preset.outputs.claude_args }}

runs:
  using: "composite"
  steps:
    - id: preset
      shell: bash
      env:
        STALE_DAYS: ${{ inputs.stale_days }}
        STALE_LABEL: ${{ inputs.stale_label }}
        MAX_ACTIONS: ${{ inputs.max_actions }}
        DRY_RUN: ${{ inputs.dry_run }}
      run: |
        python3 "${GITHUB_ACTION_PATH}/../../scripts/write_preset.py" maintain
