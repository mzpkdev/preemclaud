name: "Arasaka Develop Preset"
description: "Generate prompt, system prompt, and Claude args for issue-driven implementation"

inputs:
  issue_number:
    description: "Issue number to implement"
    required: true
  branch_name:
    description: "Already-created working branch for the implementation"
    required: true
  base_branch:
    description: "Base branch for the pull request"
    required: true
outputs:
  prompt:
    description: "Issue implementation prompt"
    value: ${{ steps.preset.outputs.prompt }}
  system_prompt:
    description: "Issue implementation system prompt"
    value: ${{ steps.preset.outputs.system_prompt }}
  claude_args:
    description: "Claude CLI arguments for issue implementation"
    value: ${{ steps.preset.outputs.claude_args }}

runs:
  using: "composite"
  steps:
    - id: preset
      shell: bash
      env:
        ISSUE_NUMBER: ${{ inputs.issue_number }}
        BRANCH_NAME: ${{ inputs.branch_name }}
        BASE_BRANCH: ${{ inputs.base_branch }}
      run: |
        python3 "${GITHUB_ACTION_PATH}/../../scripts/write_preset.py" develop
