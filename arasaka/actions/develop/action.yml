name: "Arasaka Develop Preset"
description: "Generate prompt, system prompt, and Claude args for issue-driven implementation"

inputs:
  issue_number:
    description: "Issue number to implement"
    required: true
  branch_name:
    description: "Already-created working branch for the implementation"
    required: true
  base_branch:
    description: "Base branch for the pull request"
    required: true

outputs:
  prompt:
    description: "Issue implementation prompt"
    value: ${{ steps.preset.outputs.prompt }}
  system_prompt:
    description: "Issue implementation system prompt"
    value: ${{ steps.preset.outputs.system_prompt }}
  claude_args:
    description: "Claude CLI arguments for issue implementation"
    value: ${{ steps.preset.outputs.claude_args }}

runs:
  using: "composite"
  steps:
    - id: preset
      shell: bash
      env:
        ISSUE_NUMBER: ${{ inputs.issue_number }}
        BRANCH_NAME: ${{ inputs.branch_name }}
        BASE_BRANCH: ${{ inputs.base_branch }}
      run: |
        {
          echo "prompt<<EOF"
          cat <<EOF
Implement GitHub issue #${ISSUE_NUMBER} in ${{ github.repository }}.

Execution requirements:
- Fetch the issue and its comments with GitHub MCP tools before changing code.
- Work on the already-created branch: ${BRANCH_NAME}
- Target PR base branch: ${BASE_BRANCH}
- Make the smallest reasonable change set that resolves the issue.
- Run targeted verification when practical with the tools already allowed to you.
- Commit and push your changes on the current branch.
- Open a PR with a clear title and body that includes: Closes #${ISSUE_NUMBER}
- Leave one issue comment summarizing what changed and linking the PR.

If the issue is ambiguous or under-specified, make the most conservative reasonable implementation and note the assumptions in the PR body and issue comment.
EOF
          echo "EOF"
          echo "system_prompt<<'EOF'"
          cat <<'EOF'
You are Arasaka Developer operating inside GitHub Actions.

Implement issue requests conservatively and pragmatically.

Rules:
- Read the issue and repository context before editing code.
- Prefer bounded changes over broad refactors.
- Run targeted verification when feasible with the allowed tools.
- Do not stop after editing locally; commit, push, open a PR, and report back on the issue.
- If the issue is too ambiguous to solve perfectly, choose the safest reasonable interpretation and document it.
EOF
          echo "EOF"
          echo "claude_args<<'EOF'"
          cat <<'EOF'
--max-turns 24
--allowedTools "Read,Glob,Grep,LS,Edit,MultiEdit,Write,Bash(git add:*),Bash(git commit:*),Bash(git diff:*),Bash(git fetch:*),Bash(git push:*),Bash(git status:*),Bash(gh pr:*),Bash(bun:*),Bash(make:*),Bash(npm:*),Bash(npx:*),Bash(pnpm:*),Bash(pytest:*),Bash(python:*),Bash(yarn:*),mcp__github__create_issue_comment,mcp__github__get_issue,mcp__github__get_issue_comments,mcp__github__update_issue"
EOF
          echo "EOF"
        } >> "$GITHUB_OUTPUT"
